# OCI Compose V2 — works with nerdctl compose (all platforms)
# Template variables substituted by render_compose() in speedwave-runtime.
# NEVER edit generated compose files — edit this template instead.

services:
  claude:
    image: ${IMAGE_CLAUDE}
    pull_policy: never
    container_name: ${COMPOSE_PREFIX}_${PROJECT_NAME}_claude
    read_only: true
    user: "${CONTAINER_USER}"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    extra_hosts:
      - "host.lima.internal:${HOST_GATEWAY}"
      - "host.containers.internal:${HOST_GATEWAY}"
      - "host.docker.internal:${HOST_GATEWAY}"
      - "host.speedwave.internal:${HOST_GATEWAY}"
    tmpfs:
      - /tmp:noexec,nosuid,size=512m
    volumes:
      - ${CLAUDE_HOME}:/home/speedwave:rw
      - ${PROJECT_DIR}:/workspace
      - ${RESOURCES_DIR}:/speedwave/resources:ro
      - ${IDE_LOCK_DIR}:/home/speedwave/.claude/ide:ro
    environment:
      - CLAUDE_VERSION=${CLAUDE_VERSION}
      - MCP_HUB_PORT=${PORT_HUB}
      - CLAUDE_CODE_IDE_HOST_OVERRIDE=${IDE_HOST_OVERRIDE}
      - CLAUDE_CODE_EFFORT_LEVEL=max
    working_dir: /workspace
    networks:
      - ${NETWORK_NAME}
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: ${CLAUDE_MEMORY}

  mcp-hub:
    image: ${IMAGE_MCP_HUB}
    pull_policy: never
    container_name: ${COMPOSE_PREFIX}_${PROJECT_NAME}_mcp_hub
    read_only: true
    user: "${CONTAINER_USER}"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    environment:
      - PORT=${PORT_HUB}
      - WORKER_SLACK_URL=http://mcp-slack:${PORT_WORKER}
      - WORKER_SHAREPOINT_URL=http://mcp-sharepoint:${PORT_WORKER}
      - WORKER_REDMINE_URL=http://mcp-redmine:${PORT_WORKER}
      - WORKER_GITLAB_URL=http://mcp-gitlab:${PORT_WORKER}
      - WORKER_PLAYWRIGHT_URL=http://mcp-playwright:${PORT_WORKER}
    networks:
      - ${NETWORK_NAME}
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512m

  mcp-slack:
    image: ${IMAGE_MCP_SLACK}
    pull_policy: never
    container_name: ${COMPOSE_PREFIX}_${PROJECT_NAME}_mcp_slack
    read_only: true
    user: "${CONTAINER_USER}"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    volumes:
      - ${TOKENS_DIR}/slack:/tokens:ro
    environment:
      - PORT=${PORT_WORKER}
    networks:
      - ${NETWORK_NAME}
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128m

  mcp-sharepoint:
    image: ${IMAGE_MCP_SHAREPOINT}
    pull_policy: never
    container_name: ${COMPOSE_PREFIX}_${PROJECT_NAME}_mcp_sharepoint
    read_only: true
    user: "${CONTAINER_USER}"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    volumes:
      # :rw required — SharePoint OAuth tokens expire and token-manager.ts
      # writes refreshed access_token / refresh_token back to /tokens/
      - ${TOKENS_DIR}/sharepoint:/tokens:rw
      - ${PROJECT_DIR}:/workspace:rw
    environment:
      - PORT=${PORT_WORKER}
    networks:
      - ${NETWORK_NAME}
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128m

  mcp-redmine:
    image: ${IMAGE_MCP_REDMINE}
    pull_policy: never
    container_name: ${COMPOSE_PREFIX}_${PROJECT_NAME}_mcp_redmine
    read_only: true
    user: "${CONTAINER_USER}"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    volumes:
      - ${TOKENS_DIR}/redmine:/tokens:ro
    environment:
      - PORT=${PORT_WORKER}
    networks:
      - ${NETWORK_NAME}
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128m

  mcp-gitlab:
    image: ${IMAGE_MCP_GITLAB}
    pull_policy: never
    container_name: ${COMPOSE_PREFIX}_${PROJECT_NAME}_mcp_gitlab
    read_only: true
    user: "${CONTAINER_USER}"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    volumes:
      - ${TOKENS_DIR}/gitlab:/tokens:ro
    environment:
      - PORT=${PORT_WORKER}
    networks:
      - ${NETWORK_NAME}
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128m

  mcp-playwright:
    image: ${IMAGE_MCP_PLAYWRIGHT}
    pull_policy: never
    container_name: ${COMPOSE_PREFIX}_${PROJECT_NAME}_mcp_playwright
    read_only: true
    # NOTE: Playwright image pre-creates pwuser (UID 1000); CONTAINER_USER is set
    # via substitution for consistency with other workers.
    user: "${CONTAINER_USER}"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    # Chromium uses /tmp for page caches and screenshot compositing.
    # tmpfs lives in RAM — keep it lean. Heavy screenshots return inline
    # as base64, not via /tmp.
    tmpfs:
      - /tmp:noexec,nosuid,size=1g
    # Chromium IPC shared-memory requirement; the 64 MiB default causes ENOMEM
    # at page load time.
    shm_size: 2g
    # No /tokens mount — Playwright accesses only public URLs and has no credentials.
    # No /workspace mount in v1 — outputs return as base64 to shrink attack surface.
    environment:
      - PORT=${PORT_WORKER}
      # MCP-level request/response logging (uses the `debug` npm package;
      # output goes to stderr, visible in Desktop UI → System Health logs).
      # Covers tools/call, tool responses, and errors. Set to `pw:*` for full verbosity.
      - DEBUG=pw:mcp:*
    networks:
      - ${NETWORK_NAME}
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2048m

networks:
  ${NETWORK_NAME}:
    driver: bridge
