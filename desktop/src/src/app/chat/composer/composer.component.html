<div class="relative flex flex-col gap-2 px-4 py-3 border-t" [style.border-color]="'var(--line, #2a2a2a)'">
  <app-slash-menu
    [open]="slashOpen()"
    [query]="slashQuery()"
    (selected)="applySelection($event)"
    (closed)="closeSlash()"
  />

  <div class="flex items-end gap-2">
    <button
      type="button"
      data-testid="composer-slash-btn"
      class="px-2 py-1.5 rounded mono text-[12px] border"
      [style.border-color]="'var(--line, #2a2a2a)'"
      [style.color]="'var(--ink-dim, #aaa)'"
      (click)="insertSlash()"
      aria-label="Insert slash command"
    >
      /
    </button>

    <textarea
      #textarea
      data-testid="composer-textarea"
      class="flex-1 resize-none rounded px-3 py-2 text-sm outline-none transition-colors min-h-[40px] max-h-[200px] ring-1 focus:ring-[var(--accent,#e11d48)]"
      [style.background]="'var(--bg-1, #1a1a1a)'"
      [style.color]="'var(--ink, #ddd)'"
      [style.--tw-ring-color]="'var(--line, #2a2a2a)'"
      [placeholder]="placeholder"
      [disabled]="disabled"
      (input)="onInput($event)"
      (keydown)="onKeydown($event)"
      rows="1"
    ></textarea>

    <button
      type="button"
      data-testid="composer-send"
      class="px-4 py-2 rounded mono text-[12px]"
      [style.background]="canSend() ? 'var(--accent, #e11d48)' : 'var(--bg-2, #222)'"
      [style.color]="canSend() ? 'var(--on-accent, #fff)' : 'var(--ink-mute, #888)'"
      [disabled]="!canSend()"
      (click)="submit()"
    >
      send
    </button>
  </div>
</div>
