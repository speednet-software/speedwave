@if (projectState.status === 'ready') {
  <div class="flex flex-row h-full bg-sw-bg-darkest relative">
    <app-conversations-sidebar
      [open]="ui.sidebarOpen()"
      [conversations]="conversations"
      [currentSessionId]="currentViewSessionId"
      (closed)="ui.closeSidebar()"
      (newConversation)="newConversation()"
      (viewConversation)="viewConversation($event.session_id)"
      (resumeConversation)="resumeConversation($event.session_id)"
    ></app-conversations-sidebar>

    <div class="flex flex-col flex-1 min-w-0 relative">
      <app-chat-header
        title="Chat"
        [projectName]="projectState.activeProject || ''"
        [memoryOpen]="showMemory"
        [historyOpen]="showHistory"
        (toggleMemory)="toggleMemory()"
        (toggleHistory)="toggleHistory()"
      />

      @if (historyError) {
        <div
          class="px-3 py-2 mx-3 my-2 bg-sw-error-bg border border-sw-error rounded text-sw-error text-xs"
          data-testid="chat-history-error"
        >
          {{ historyError }}
        </div>
      }
      @if (viewError) {
        <div
          class="px-3 py-2 mx-3 my-2 bg-sw-error-bg border border-sw-error rounded text-sw-error text-xs"
          data-testid="chat-view-error"
        >
          {{ viewError }}
        </div>
      }
      @if (viewingTranscript) {
        <div class="flex-1 overflow-y-auto p-4 flex flex-col gap-3" data-testid="chat-messages">
          @for (msg of viewingTranscript.messages; track $index) {
            <div
              class="w-fit max-w-[85%] px-4 py-3 rounded-lg leading-normal break-words"
              [class.self-end]="msg.role === 'user'"
              [class.bg-sw-bg-navy]="msg.role === 'user'"
              [class.self-start]="msg.role === 'assistant'"
              [class.bg-sw-bg-dark]="msg.role === 'assistant'"
              [class.border]="msg.role === 'assistant'"
              [class.border-sw-border]="msg.role === 'assistant'"
            >
              <app-text-block [content]="msg.content" />
            </div>
          }
        </div>
        <div class="flex gap-2 px-4 py-3 bg-sw-bg-dark border-t border-sw-border justify-end">
          <button
            class="px-5 py-2 border-none rounded-md text-sm font-semibold cursor-pointer transition-colors bg-sw-bg-navy text-sw-text hover:bg-[#1a1a4e]"
            data-testid="chat-transcript-back"
            (click)="closeTranscript()"
          >
            Back
          </button>
          <button
            class="px-5 py-2 border-none rounded-md text-sm font-semibold cursor-pointer transition-colors bg-sw-accent text-white hover:bg-sw-accent-hover"
            data-testid="chat-transcript-resume"
            (click)="resumeConversation(viewingTranscript.session_id)"
          >
            Resume
          </button>
        </div>
      } @else {
        <app-chat-message-list
          [messages]="chat.messages"
          [currentBlocks]="chat.currentBlocks"
          [isStreaming]="chat.isStreaming"
          [lastAssistantIndex]="lastAssistantIndex"
          (questionAnswered)="onQuestionAnswered($event)"
        />
        <app-session-stats [stats]="chat.sessionStats" />
        <div class="px-4 py-3 bg-sw-bg-dark border-t border-sw-border flex gap-2">
          <app-composer
            class="flex-1"
            [disabled]="chat.isStreaming"
            (submitted)="sendMessage($event)"
          />
          @if (chat.isStreaming) {
            <button
              data-testid="chat-stop"
              class="px-5 py-2 border-none rounded-md bg-sw-destructive text-white text-sm font-semibold transition-colors hover:enabled:bg-sw-destructive-hover cursor-pointer"
              (click)="onStopClicked()"
              title="Stop (Esc)"
              aria-label="Stop conversation"
            >
              Stop
            </button>
          }
        </div>
      }

      <app-memory-panel
        [open]="ui.memoryOpen()"
        [markdown]="projectMemory"
        [error]="memoryError"
        (closed)="ui.closeMemory()"
      ></app-memory-panel>
    </div>
  </div>
}
