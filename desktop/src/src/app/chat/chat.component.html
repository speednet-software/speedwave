@if (projectState.status === 'ready') {
  <section class="relative flex h-full overflow-hidden bg-[var(--bg)]" data-testid="chat-view">
    <!-- Left overlay drawer: conversations history. Mounts as a singleton and
         portals into a CDK Overlay when ui.sidebarOpen() flips to true. The
         overlay handles its own backdrop / Escape / focus trap. -->
    <app-conversations-sidebar
      [open]="ui.sidebarOpen()"
      [conversations]="conversations"
      [currentSessionId]="currentViewSessionId"
      (closed)="ui.closeSidebar()"
      (resumeConversation)="resumeConversation($event.session_id)"
    />

    <!-- Main column: header + body (messages or transcript) + composer. -->
    <div class="relative flex min-h-0 min-w-0 flex-1 flex-col overflow-hidden">
      <app-chat-header
        viewTitle="Chat"
        [memoryOpen]="showMemory"
        [historyOpen]="showHistory"
        (toggleMemory)="toggleMemory()"
        (toggleHistory)="toggleHistory()"
        (newConversation)="newConversation()"
      />

      @if (historyError) {
        <div
          class="mono mx-4 my-2 rounded border border-red-500/40 bg-red-500/5 px-3 py-2 text-[12px] text-red-300"
          data-testid="chat-history-error"
          role="alert"
        >
          {{ historyError }}
        </div>
      }
      <app-chat-message-list
        class="min-h-0 flex-1 overflow-hidden"
        [messages]="chat.messages"
        [currentBlocks]="chat.currentBlocks"
        [isStreaming]="chat.isStreaming"
        [lastAssistantIndex]="lastAssistantIndex"
        (questionAnswered)="onQuestionAnswered($event)"
      />
      <div class="border-t border-[var(--line)] bg-[var(--bg-2)] px-4 pt-3 md:px-6">
        <div class="relative mx-auto max-w-3xl">
          <app-composer
            #composer
            [streaming]="chat.isStreaming"
            [queuedText]="chat.pendingQueue?.text ?? ''"
            (submitted)="sendMessage($event)"
            (queueRequested)="onQueueRequested($event)"
            (queueCancelled)="onQueueCancelled()"
            (stopRequested)="onStopClicked()"
          />
          <app-session-stats [stats]="chat.sessionStats" [branch]="gitBranch()" />
        </div>
      </div>
    </div>

    <!-- Left overlay drawer: project memory. Mounts as a singleton and portals
         into a CDK Overlay when ui.memoryOpen() flips to true. Mutually
         exclusive with the conversations drawer (UiStateService). -->
    <app-memory-panel
      [open]="ui.memoryOpen()"
      [markdown]="projectMemory"
      [error]="memoryError"
      (closed)="ui.closeMemory()"
    />
  </section>
} @else if (projectState.status === 'auth_required') {
  <!-- Auth-required is the only non-ready status that shell.component does
       NOT cover with its own blocking overlay (the user can still navigate
       freely to /settings to configure auth). All other transient statuses
       — loading / starting / switching / error / check_failed — are owned
       by the shell, so chat must stay silent for them to avoid stacking
       two overlays on the same screen. -->
  <section
    class="flex h-full flex-col items-center justify-center bg-[var(--bg)] p-8"
    data-testid="chat-view-blocked"
  >
    <div class="mono max-w-md text-center text-[12.5px] text-[var(--ink-dim)]">
      <p class="text-[var(--amber)]">⚠ auth required</p>
      <p class="mt-2">Sign in to Anthropic or configure an API key to start chatting.</p>
      <a routerLink="/settings" class="mono mt-4 inline-block text-[var(--accent)] hover:underline"
        >open settings →</a
      >
    </div>
  </section>
}
