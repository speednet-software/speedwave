# Desktop Release — builds Tauri desktop app + CLI binaries for all platforms
#
# Based on the official Tauri v2 GitHub Actions guide:
#   https://v2.tauri.app/distribute/pipelines/github/
#
# tauri-action handles release creation, artifact upload, and updater JSON
# generation automatically — no custom release management needed.
#
# Triggers:
#   - workflow_call (from release-please.yml — provides version, tag_name)
#   - workflow_dispatch (manual, with version input)
#
# Required secrets:
#   TAURI_SIGNING_PRIVATE_KEY          — Ed25519 private key for Tauri updater signatures
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD — passphrase for the signing key (can be empty string)
#
# Optional secrets (code signing):
#   APPLE_CERTIFICATE                  — base64-encoded .p12 Developer ID Application certificate
#   APPLE_CERTIFICATE_PASSWORD         — passphrase for the .p12 certificate
#   APPLE_SIGNING_IDENTITY             — e.g. "Developer ID Application: Your Name (TEAMID)"
#   APPLE_ID                           — Apple ID email for notarization
#   APPLE_PASSWORD                     — app-specific password for notarization
#   APPLE_TEAM_ID                      — Apple Developer Team ID
#   WINDOWS_CERTIFICATE                — base64-encoded .pfx code signing certificate
#   WINDOWS_CERTIFICATE_PASSWORD       — passphrase for the .pfx certificate

name: Desktop Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.1.0)"
        required: true
  workflow_call:
    inputs:
      version:
        type: string
        required: true
      tag_name:
        type: string
        required: false

permissions: {}

concurrency:
  group: release-build
  cancel-in-progress: false

jobs:
  # ── Resolve version from trigger source ────────────────────────────────
  resolve:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      tag_name: ${{ steps.resolve.outputs.tag_name }}
      release_id: ${{ steps.resolve.outputs.release_id }}
      tag_exists: ${{ steps.resolve.outputs.tag_exists }}
    steps:
      - name: Resolve version and release parameters
        id: resolve
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_TAG_NAME: ${{ inputs.tag_name }}
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          VERSION="$INPUT_VERSION"

          # tag_name from workflow_call (release-please.yml) or derive from version
          if [ -n "$INPUT_TAG_NAME" ]; then
            TAG="$INPUT_TAG_NAME"
          else
            TAG="v${VERSION}"
          fi

          # Validate version format (stable only — no pre-release suffixes)
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: Version '$VERSION' has invalid format. Expected: X.Y.Z"
            exit 1
          fi

          # Look up draft release ID from tag
          RELEASE_ID=$(gh release view "$TAG" --repo "$REPO" --json databaseId --jq '.databaseId' 2>/dev/null || true)

          if [ -z "$RELEASE_ID" ]; then
            echo "No existing release found for tag $TAG — tauri-action will create one"
          else
            echo "Found existing release ID: $RELEASE_ID for tag $TAG"
          fi

          # Check if tag exists on remote (needed for deterministic checkout)
          TAG_EXISTS=$(gh api "repos/$REPO/git/refs/tags/$TAG" --jq '.ref' 2>/dev/null || true)
          if [ -n "$TAG_EXISTS" ]; then
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
          elif [ -z "$INPUT_TAG_NAME" ]; then
            # workflow_dispatch (no tag_name input) — tag must exist to ensure correct code
            echo "::error::Tag $TAG does not exist. Manual dispatch requires an existing tag to build the correct code."
            echo "::error::Either create the tag first, or use workflow_call from release-please."
            exit 1
          else
            # workflow_call — tag may not exist yet (race condition), fall back to branch HEAD
            echo "::warning::Tag $TAG does not exist — build will use branch HEAD"
            echo "tag_exists=false" >> "$GITHUB_OUTPUT"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG" >> "$GITHUB_OUTPUT"
          echo "release_id=$RELEASE_ID" >> "$GITHUB_OUTPUT"

          echo "Resolved: version=$VERSION tag=$TAG release_id=$RELEASE_ID tag_exists=$TAG_EXISTS"

  # ── Desktop app (Tauri) — official tauri-action pattern ──────────────────
  publish-tauri:
    needs: resolve
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            arch_label: "macOS_Apple_Silicon"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            arch_label: "macOS_Intel"
          - platform: ubuntu-22.04
            args: ""
            arch_label: ""
          - platform: windows-latest
            args: ""
            arch_label: ""
    timeout-minutes: 45
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ needs.resolve.outputs.tag_exists == 'true' && needs.resolve.outputs.tag_name || '' }}
          persist-credentials: false

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: desktop/src/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7  # stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Ensure cross-compile target is installed
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          workspaces: "./desktop/src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci
        working-directory: desktop/src

      # Export code-signing secrets to GITHUB_ENV only when they are configured.
      # tauri-action attempts certificate import when APPLE_CERTIFICATE env var
      # exists (even if empty), so we must not set it unless the secret is real.
      - name: Configure macOS code signing
        if: matrix.platform == 'macos-latest'
        env:
          CERT: ${{ secrets.APPLE_CERTIFICATE }}
          CERT_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID_VAL: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD_VAL: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID_VAL: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$CERT" ]; then
            # Mask all secrets before writing to GITHUB_ENV
            echo "::add-mask::$CERT"
            echo "::add-mask::$CERT_PASSWORD"
            echo "::add-mask::$SIGNING_IDENTITY"
            echo "::add-mask::$APPLE_ID_VAL"
            echo "::add-mask::$APPLE_PASSWORD_VAL"
            echo "::add-mask::$APPLE_TEAM_ID_VAL"
            echo "APPLE_CERTIFICATE=$CERT" >> "$GITHUB_ENV"
            echo "APPLE_CERTIFICATE_PASSWORD=$CERT_PASSWORD" >> "$GITHUB_ENV"
            echo "APPLE_SIGNING_IDENTITY=$SIGNING_IDENTITY" >> "$GITHUB_ENV"
            echo "APPLE_ID=$APPLE_ID_VAL" >> "$GITHUB_ENV"
            echo "APPLE_PASSWORD=$APPLE_PASSWORD_VAL" >> "$GITHUB_ENV"
            echo "APPLE_TEAM_ID=$APPLE_TEAM_ID_VAL" >> "$GITHUB_ENV"
            echo "::notice::macOS code signing configured"
          else
            echo "::notice::macOS code signing skipped (no APPLE_CERTIFICATE secret)"
          fi

      # tauri-action does not import the certificate into the macOS keychain —
      # it only passes APPLE_CERTIFICATE to tauri-bundler for signing the outer
      # .app. Our beforeBundleCommand (scripts/sign-bundled-binaries.sh) runs
      # `codesign --sign "$APPLE_SIGNING_IDENTITY"` on bundled Mach-O resources
      # and requires the identity to already be resolvable in a keychain.
      # This step performs the prescribed Tauri/Apple pattern of creating a
      # throwaway build keychain and importing the .p12 before tauri-action
      # starts. See: https://v2.tauri.app/distribute/sign/macos/
      - name: Import Apple signing certificate to keychain
        if: matrix.platform == 'macos-latest' && env.APPLE_CERTIFICATE != ''
        shell: bash
        env:
          CERT: ${{ env.APPLE_CERTIFICATE }}
          CERT_PASSWORD: ${{ env.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          CERT_FILE="$RUNNER_TEMP/apple-cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          # Random password — keychain is ephemeral, destroyed with the runner.
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          echo "::add-mask::$KEYCHAIN_PASSWORD"

          echo "$CERT" | base64 --decode > "$CERT_FILE"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Prepend the build keychain to the search list so codesign can find
          # the identity without overriding the login keychain globally.
          # macOS ships bash 3.2 which lacks mapfile — use a while-read loop.
          _existing_keychains=()
          while IFS= read -r _kc; do
            [ -n "$_kc" ] && _existing_keychains+=("$_kc")
          done < <(security list-keychains -d user | tr -d '"' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          security list-keychains -d user -s "$KEYCHAIN_PATH" "${_existing_keychains[@]}"

          security import "$CERT_FILE" \
            -k "$KEYCHAIN_PATH" \
            -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          rm -f "$CERT_FILE"

          # Guard against an empty APPLE_SIGNING_IDENTITY — `grep -q ""` would
          # match every line and the verification below would silently pass
          # even without a usable identity in the keychain.
          if [ -z "${APPLE_SIGNING_IDENTITY:-}" ]; then
            echo "::error::APPLE_SIGNING_IDENTITY is empty — check the repository secret"
            exit 1
          fi
          # Verify the identity is now resolvable — fail fast if not.
          # -qF: fixed-string match, since the identity contains `()` which
          # grep would otherwise treat as regex metacharacters in ERE.
          if ! security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
               | grep -qF "$APPLE_SIGNING_IDENTITY"; then
            echo "::error::APPLE_SIGNING_IDENTITY not found in imported keychain"
            security find-identity -v -p codesigning "$KEYCHAIN_PATH" || true
            exit 1
          fi
          echo "::notice::Apple signing identity imported and verified in build keychain"

      - name: Configure Windows code signing
        if: matrix.platform == 'windows-latest'
        env:
          CERT: ${{ secrets.WINDOWS_CERTIFICATE }}
          CERT_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        shell: bash
        run: |
          if [ -n "$CERT" ]; then
            echo "::add-mask::$CERT"
            echo "::add-mask::$CERT_PASSWORD"
            echo "WINDOWS_CERTIFICATE=$CERT" >> "$GITHUB_ENV"
            echo "WINDOWS_CERTIFICATE_PASSWORD=$CERT_PASSWORD" >> "$GITHUB_ENV"
            echo "::notice::Windows code signing configured"
          else
            echo "::notice::Windows code signing skipped (no WINDOWS_CERTIFICATE secret)"
          fi

      - name: Download Lima for bundling
        if: contains(matrix.platform, 'macos')
        uses: ./.github/actions/download-lima
        with:
          arch: ${{ contains(matrix.args, 'aarch64') && 'aarch64' || 'x86_64' }}

      - name: Download nerdctl-full for bundling
        if: matrix.platform == 'ubuntu-22.04'
        uses: ./.github/actions/download-nerdctl-full
        with:
          arch: amd64

      - name: Download WSL resources for offline bundling
        if: matrix.platform == 'windows-latest'
        uses: ./.github/actions/download-wsl-resources

      - name: Download Node.js for bundling
        uses: ./.github/actions/download-nodejs
        with:
          platform: ${{ contains(matrix.platform, 'macos') && 'darwin' || (matrix.platform == 'windows-latest' && 'win' || 'linux') }}
          # NOTE: assumes all non-macOS-aarch64 builds are x64. If a Linux arm64 runner
          # is ever added to the matrix, this must be updated to detect runner arch separately.
          arch: ${{ (contains(matrix.platform, 'macos') && contains(matrix.args, 'aarch64')) && 'arm64' || 'x64' }}

      - name: Bundle build context and mcp-os
        shell: bash
        run: scripts/bundle-build-context.sh --ci

      - name: Build macOS native CLI binaries
        if: contains(matrix.platform, 'macos')
        shell: bash
        run: scripts/build-native-macos.sh

      - name: Bundle macOS native CLI binaries
        if: contains(matrix.platform, 'macos')
        shell: bash
        run: scripts/bundle-native-assets.sh

      - name: Build CLI for bundling
        shell: bash
        env:
          MATRIX_ARGS: ${{ matrix.args }}
          MATRIX_PLATFORM: ${{ matrix.platform }}
        run: |
          # Extract --target value from matrix.args using sed (BSD-compatible)
          TARGET=$(echo "$MATRIX_ARGS" | sed -n 's/.*--target \([^ ]*\).*/\1/p')
          if [ -n "$TARGET" ]; then
            cargo build --release --target "$TARGET" -p speedwave-cli
            CLI_BIN="target/$TARGET/release/speedwave"
          else
            cargo build --release -p speedwave-cli
            CLI_BIN="target/release/speedwave"
          fi
          # Windows: append .exe
          if [ "$MATRIX_PLATFORM" = "windows-latest" ]; then
            CLI_BIN="${CLI_BIN}.exe"
          fi
          mkdir -p desktop/src-tauri/cli
          cp "$CLI_BIN" desktop/src-tauri/cli/

      - name: Verify bundled runtime assets
        shell: bash
        env:
          MATRIX_PLATFORM: ${{ matrix.platform }}
        run: |
          if [ "$MATRIX_PLATFORM" = "windows-latest" ]; then
            scripts/verify-bundled-assets.sh windows
          elif [ "$MATRIX_PLATFORM" = "ubuntu-22.04" ]; then
            scripts/verify-bundled-assets.sh linux
          else
            scripts/verify-bundled-assets.sh macos
          fi

      # When releaseId is set, tauri-action uploads artifacts to the existing
      # release and ignores tagName/releaseName/releaseDraft. When releaseId is
      # empty (manual dispatch), tauri-action creates/finds the release by tag.
      - uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5  # v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: desktop/src-tauri
          releaseId: ${{ needs.resolve.outputs.release_id }}
          tagName: ${{ needs.resolve.outputs.release_id == '' && needs.resolve.outputs.tag_name || '' }}
          releaseName: ${{ needs.resolve.outputs.release_id == '' && format('Speedwave {0}', needs.resolve.outputs.tag_name) || '' }}
          releaseBody: ${{ needs.resolve.outputs.release_id == '' && 'See the assets to download and install this version.' || '' }}
          releaseDraft: ${{ needs.resolve.outputs.release_id == '' && 'true' || 'false' }}
          prerelease: false
          args: ${{ matrix.args }}
          assetNamePattern: ${{ matrix.arch_label != '' && format('[name]_[version]_{0}[setup][ext]', matrix.arch_label) || '' }}

      - name: Install Linux packaging tools
        if: matrix.platform == 'ubuntu-22.04'
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev

  # ── CLI binary cross-compilation ─────────────────────────────────────────
  # Runs after publish-tauri so the GitHub release already exists
  cli:
    needs: [resolve, publish-tauri]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ needs.resolve.outputs.tag_exists == 'true' && needs.resolve.outputs.tag_name || '' }}
          persist-credentials: false

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7  # stable
        with:
          targets: ${{ matrix.target }}

      - name: Ensure cross-compile target is installed
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: rustup target add "$TARGET"

      - name: Rust cache
        uses: swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          shared-key: cli-${{ matrix.target }}

      - name: Build CLI
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: cargo build --release --target "$TARGET" -p speedwave-cli

      - name: Package CLI (unix)
        if: matrix.archive == 'tar.gz'
        env:
          VERSION: ${{ needs.resolve.outputs.version }}
          TARGET: ${{ matrix.target }}
        run: |
          ARCHIVE_NAME="speedwave-v${VERSION}-${TARGET}.tar.gz"
          chmod +x "target/${TARGET}/release/speedwave"
          tar -czf "$ARCHIVE_NAME" -C "target/${TARGET}/release" speedwave
          echo "ARCHIVE_NAME=$ARCHIVE_NAME" >> "$GITHUB_ENV"

      - name: Package CLI (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        env:
          VERSION: ${{ needs.resolve.outputs.version }}
          TARGET: ${{ matrix.target }}
        run: |
          $archiveName = "speedwave-v${env:VERSION}-${env:TARGET}.zip"
          Compress-Archive -Path "target/${env:TARGET}/release/speedwave.exe" -DestinationPath $archiveName
          "ARCHIVE_NAME=$archiveName" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload CLI to release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.resolve.outputs.tag_name }}
          REPO: ${{ github.repository }}
        run: gh release upload "$TAG_NAME" "$ARCHIVE_NAME" --repo "$REPO" --clobber

  # ── Publish release: draft → live after all builds succeed ──────────────
  publish-release:
    needs: [resolve, publish-tauri, cli]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Validate artifacts and publish release
        env:
          # Use RELEASE_TOKEN (PAT) instead of GITHUB_TOKEN so that the
          # release:published event triggers downstream workflows (backmerge).
          # GITHUB_TOKEN events don't trigger new workflow runs.
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          TAG_NAME: ${{ needs.resolve.outputs.tag_name }}
          VERSION: ${{ needs.resolve.outputs.version }}
          RELEASE_ID: ${{ needs.resolve.outputs.release_id }}
          REPO: ${{ github.repository }}
        run: |
          set -e

          # Resolve release ID — use the one from resolve job, or look it up by tag
          RID="$RELEASE_ID"
          if [ -z "$RID" ]; then
            RID=$(gh release view "$TAG_NAME" --repo "$REPO" --json databaseId --jq '.databaseId')
          fi

          if [ -z "$RID" ]; then
            echo "ERROR: Could not find release for tag $TAG_NAME"
            exit 1
          fi

          # Verify asset count (~12 Tauri + 4 CLI + latest.json = 17 minimum)
          ASSET_COUNT=$(gh api "repos/$REPO/releases/$RID/assets" --jq 'length')
          echo "Release has $ASSET_COUNT assets"
          if [ "$ASSET_COUNT" -lt 17 ]; then
            echo "::error::Release has $ASSET_COUNT assets (expected 17+: ~12 Tauri + 4 CLI + latest.json). Some platforms may have failed."
            echo "::error::To publish anyway: gh api --method PATCH repos/$REPO/releases/$RID -f draft=false"
            exit 1
          fi

          # Publish: draft -> live
          gh api --method PATCH "repos/$REPO/releases/$RID" -f draft=false
          echo "Release published successfully"

          # Verify latest.json has correct version
          LATEST_VERSION=$(gh release download "$TAG_NAME" --repo "$REPO" --pattern "latest.json" --output - | jq -r '.version')
          if [ "$LATEST_VERSION" != "$VERSION" ]; then
            echo "::error::latest.json reports version '$LATEST_VERSION' but expected '$VERSION'"
            echo "::error::This indicates the build checked out wrong code. Reverting to draft."
            gh api --method PATCH "repos/$REPO/releases/$RID" -f draft=true
            exit 1
          fi
          echo "Verified: latest.json version matches expected version $VERSION"
