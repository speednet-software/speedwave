name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

concurrency:
  group: claude-review-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  claude-review-run:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.user.login != 'dependabot[bot]' &&
      github.actor == github.repository_owner
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@26ec041249acb0a944c0a47b6c0c13f05dbc5b44  # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          prompt: |
            Review this pull request. Focus on:
            - Code quality and correctness
            - Potential bugs
            - Security implications
            - Adherence to project conventions in CLAUDE.md

            Use `gh pr diff` to see the changes.
            Use `mcp__github_inline_comment__create_inline_comment` for specific code issues.
            Use `Bash(gh pr comment)` for top-level summary feedback.
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Read,Glob,Grep"

  claude-review:
    needs: claude-review-run
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Gate result
        run: |
          if [ "${{ needs.claude-review-run.result }}" = "failure" ]; then
            exit 1
          fi
