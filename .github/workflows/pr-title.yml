name: PR Title

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
    branches: [main, dev]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate conventional commit title
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          PATTERN='^(feat|fix|chore|docs|style|refactor|perf|test|build|ci|revert)(\(.+\))?(!)?: .+'
          if [[ ! "$TITLE" =~ $PATTERN ]]; then
            echo "::error::PR title must be a conventional commit: type(scope): description"
            echo ""
            echo "Examples:"
            echo "  feat(runtime): add logging support"
            echo "  fix(desktop): resolve crash on startup"
            echo "  chore(deps): bump dependencies"
            echo "  docs: update ADR index"
            echo ""
            echo "Allowed types: feat, fix, chore, docs, style, refactor, perf, test, build, ci, revert"
            echo ""
            echo "Your title: $TITLE"
            exit 1
          fi
          echo "✅ PR title is valid: $TITLE"
