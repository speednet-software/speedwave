name: Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7  # stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('Cargo.lock', 'desktop/src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-lint-

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            mcp-servers/package-lock.json

      - name: Install dependencies
        run: |
          cargo fetch
          npm ci --ignore-scripts
          cd mcp-servers && npm ci

      - name: Rust clippy
        run: cargo clippy -p speedwave-runtime -p speedwave-cli -- -D warnings

      - name: Rust format check
        run: cargo fmt --all -- --check

      - name: Prettier format check
        run: npx prettier --check 'mcp-servers/*/src/**/*.ts' 'desktop/src/src/**/*.ts' '*.md'

      - name: MCP type-check (build shared first)
        working-directory: mcp-servers
        run: |
          (cd shared && npx tsc)
          for ws in hub slack sharepoint redmine gitlab os; do
            echo "tsc --noEmit $ws"
            (cd "$ws" && npx tsc --noEmit)
          done

      - name: MCP ESLint
        working-directory: mcp-servers
        run: npx eslint .

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7  # stable

      - name: Cache Cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-test-

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            mcp-servers/package-lock.json

      - name: Install dependencies
        run: |
          cargo fetch
          npm ci --ignore-scripts
          cd mcp-servers && npm ci

      - name: Rust tests
        run: make test-rust

      - name: MCP tests + coverage
        run: make coverage-mcp

      - name: Install bats
        run: sudo apt-get update && sudo apt-get install -y bats

      - name: Entrypoint tests
        run: make test-entrypoint

  desktop:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7  # stable
        with:
          components: clippy

      - name: Cache Cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            desktop/src-tauri/target/
          key: ${{ runner.os }}-cargo-desktop-${{ hashFiles('desktop/src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-desktop-

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: desktop/src/package-lock.json

      - name: Install dependencies
        working-directory: desktop/src-tauri
        run: cargo fetch

      - name: Install Angular dependencies
        working-directory: desktop/src
        run: npm ci

      - name: Install mcp-servers dependencies
        # Required by `make test-desktop-build` → `build-mcp` → TypeScript
        # compiler needs @types/node and mcp-servers workspace deps.
        working-directory: mcp-servers
        run: npm ci

      - name: Create resource stubs for Tauri build script
        run: |
          mkdir -p desktop/src-tauri/nerdctl-full/{bin,lib,libexec,share}
          mkdir -p desktop/src-tauri/THIRD-PARTY-LICENSES
          mkdir -p desktop/src-tauri/build-context/containers/claude-resources
          mkdir -p desktop/src-tauri/build-context/mcp-servers
          mkdir -p desktop/src-tauri/mcp-os/os/dist
          mkdir -p desktop/src-tauri/mcp-os/shared/dist
          mkdir -p desktop/src-tauri/mcp-os/shared/node_modules
          mkdir -p desktop/src-tauri/mcp-os/os/node_modules/@speedwave/mcp-shared
          mkdir -p desktop/src-tauri/nodejs/bin
          touch desktop/src-tauri/build-context/containers/Containerfile.claude
          touch desktop/src-tauri/build-context/mcp-servers/tsconfig.base.json
          touch desktop/src-tauri/mcp-os/os/dist/index.js
          touch desktop/src-tauri/mcp-os/shared/package.json
          touch desktop/src-tauri/mcp-os/shared/package-lock.json
          touch desktop/src-tauri/nodejs/bin/node
          touch desktop/src-tauri/nodejs/node.exe
          mkdir -p desktop/src-tauri/cli
          touch desktop/src-tauri/cli/speedwave

      - name: Desktop clippy
        working-directory: desktop/src-tauri
        env:
          SPEEDWAVE_ALLOW_BUNDLE_STUBS: "1"
        run: cargo clippy -- -D warnings

      - name: Angular ESLint
        working-directory: desktop/src
        run: npx eslint 'src/**/*.ts'

      - name: Angular tests + coverage
        working-directory: desktop/src
        # Use `ng test` rather than `npx vitest run` directly: the
        # `@angular/build:unit-test` builder generates the
        # `init-testbed.js` bootstrap chunk that calls
        # `TestBed.initTestEnvironment()` and the jsdom DOM. Calling
        # vitest directly skips that chunk and every spec fails with
        # "Need to call TestBed.initTestEnvironment() first" /
        # "document is not defined".
        # `--runner-config vitest.config.ts` opts in to `retry: 2`,
        # which covers a hoist race in Vitest's `isolate: false` mode
        # forced by the Angular unit-test builder. See vitest.config.ts.
        run: npx ng test --no-watch --coverage --runner-config vitest.config.ts

      - name: Install bats
        run: sudo apt-get update && sudo apt-get install -y bats

      - name: Desktop config tests (fast)
        run: make test-desktop-config

      - name: Release-gate tests (gh shim)
        run: make test-release-gate

      - name: Desktop bats tests
        # Runs make test-desktop-build which has build-angular + build-mcp
        # as dependencies. desktop-build.bats checks that the Angular
        # frontendDist contains index.html after the build — skipping the
        # build step would defeat the purpose of that assertion.
        run: make test-desktop-build

  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 24

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7  # stable

      - name: Cache Cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-audit-${{ hashFiles('Cargo.lock', 'desktop/src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-audit-

      - name: npm audit (mcp-servers)
        run: cd mcp-servers && npm audit --audit-level=high --omit=dev

      - name: npm audit (desktop)
        run: cd desktop/src && npm audit --audit-level=high --omit=dev

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: cargo audit (root workspace)
        run: cargo audit

      - name: cargo audit (desktop)
        run: cargo audit --file desktop/src-tauri/Cargo.lock

  swift:
    if: github.event_name == 'pull_request'
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Build native macOS CLI binaries (universal)
        run: scripts/build-native-macos.sh

      - name: Run Swift tests
        run: make test-swift
