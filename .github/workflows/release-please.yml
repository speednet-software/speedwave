name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38  # v4.4.0
        id: release
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          target-branch: main

      # Defense-in-depth: ensure the release PR has the label that release-please
      # needs to identify it as a merged release PR. The labeling API call inside
      # release-please can fail transiently (PR node ID not propagated yet).
      - name: Ensure release PR has autorelease label
        if: steps.release.outputs.pr
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          PR_JSON: ${{ steps.release.outputs.pr }}
          REPO: ${{ github.repository }}
        run: |
          PR_NUMBER=$(echo "$PR_JSON" | jq -r '.number // empty' 2>/dev/null || echo "$PR_JSON")
          if [ -z "$PR_NUMBER" ] || ! [[ "$PR_NUMBER" =~ ^[0-9]+$ ]]; then
            echo "::warning::Could not parse PR number from release-please output"
            exit 0
          fi
          LABELS=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json labels --jq '.labels[].name')
          if echo "$LABELS" | grep -q "autorelease: pending"; then
            echo "Label already present"
            exit 0
          fi
          for i in 1 2 3; do
            sleep $((i * 5))
            gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label "autorelease: pending" && exit 0
          done
          echo "::warning::Failed to apply label after 3 retries"

  build-and-publish:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    uses: ./.github/workflows/desktop-release.yml
    with:
      version: ${{ needs.release-please.outputs.version }}
      tag_name: ${{ needs.release-please.outputs.tag_name }}
    secrets: inherit
