name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@8bb7a2ed0f90c9802c83129a9488d235a1f31a7c  # v4 main (release-please 17.3.0 — fixes force-tag-creation with draft releases)
        id: release
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          target-branch: main

      # Defense-in-depth: ensure the release PR has the label that release-please
      # needs to identify it as a merged release PR. The labeling API call inside
      # release-please can fail transiently (PR node ID not propagated yet).
      - name: Ensure release PR has autorelease label
        if: steps.release.outputs.pr
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          PR_JSON: ${{ steps.release.outputs.pr }}
          REPO: ${{ github.repository }}
        run: |
          PR_NUMBER=$(echo "$PR_JSON" | jq -r '.number // empty' 2>/dev/null || echo "$PR_JSON")
          if [ -z "$PR_NUMBER" ] || ! [[ "$PR_NUMBER" =~ ^[0-9]+$ ]]; then
            echo "::warning::Could not parse PR number from release-please output"
            exit 0
          fi
          LABELS=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json labels --jq '.labels[].name')
          if echo "$LABELS" | grep -q "autorelease: pending"; then
            echo "Label already present"
            exit 0
          fi
          for i in 1 2 3; do
            sleep $((i * 5))
            gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label "autorelease: pending" && exit 0
          done
          echo "::warning::Failed to apply label after 3 retries"

      # Defense-in-depth: ensure the git tag exists as a ref. GitHub draft
      # releases may not create a git ref, even with force-tag-creation: true.
      # Without the tag, checkout in desktop-release.yml fails.
      - name: Ensure release tag exists
        if: steps.release.outputs.release_created == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
          SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        run: |
          if gh api "repos/$REPO/git/refs/tags/${TAG_NAME#v}" --jq '.ref' 2>/dev/null || \
             gh api "repos/$REPO/git/refs/tags/$TAG_NAME" --jq '.ref' 2>/dev/null; then
            echo "Tag $TAG_NAME already exists"
            exit 0
          fi
          echo "Tag $TAG_NAME missing — creating from $SHA"
          gh api "repos/$REPO/git/refs" \
            -f "ref=refs/tags/$TAG_NAME" \
            -f "sha=$SHA" --jq '.ref'
          echo "Tag created successfully"

  build-and-publish:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    uses: ./.github/workflows/desktop-release.yml
    with:
      version: ${{ needs.release-please.outputs.version }}
      tag_name: ${{ needs.release-please.outputs.tag_name }}
    secrets: inherit
