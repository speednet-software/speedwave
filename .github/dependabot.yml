version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    target-branch: dev
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      rust-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: cargo
    directory: /desktop/src-tauri
    target-branch: dev
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      rust-desktop-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /
    target-branch: dev
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      npm-root-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /mcp-servers
    target-branch: dev
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      npm-mcp-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /desktop/src
    target-branch: dev
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      npm-desktop-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    target-branch: dev
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: docker
    directory: /mcp-servers/hub
    target-branch: dev
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    labels:
      - dependencies

  - package-ecosystem: docker
    directory: /mcp-servers/slack
    target-branch: dev
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    labels:
      - dependencies

  - package-ecosystem: docker
    directory: /mcp-servers/sharepoint
    target-branch: dev
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    labels:
      - dependencies

  - package-ecosystem: docker
    directory: /mcp-servers/redmine
    target-branch: dev
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    labels:
      - dependencies

  - package-ecosystem: docker
    directory: /mcp-servers/gitlab
    target-branch: dev
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    labels:
      - dependencies
