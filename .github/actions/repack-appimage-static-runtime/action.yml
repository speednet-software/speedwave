name: 'Repack AppImage with Static Runtime'
description: 'Replaces the default AppImage runtime with a static type2-runtime that bundles libfuse, eliminating the libfuse2 system dependency'
runs:
  using: 'composite'
  steps:
    - name: Repack AppImage with static type2-runtime
      shell: bash
      run: |
        set -euo pipefail
        CONSTS=crates/speedwave-runtime/src/consts.rs

        # Read SHA256 hashes from SSOT
        RUNTIME_SHA256=$(grep -A1 '^pub const APPIMAGE_RUNTIME_SHA256_X86_64' "$CONSTS" | grep '"' | sed 's/.*"\(.*\)".*/\1/')
        [ -n "$RUNTIME_SHA256" ] || { echo "::error::Failed to parse APPIMAGE_RUNTIME_SHA256_X86_64 from consts.rs"; exit 1; }

        TOOL_SHA256=$(grep -A1 '^pub const APPIMAGETOOL_SHA256_X86_64' "$CONSTS" | grep '"' | sed 's/.*"\(.*\)".*/\1/')
        [ -n "$TOOL_SHA256" ] || { echo "::error::Failed to parse APPIMAGETOOL_SHA256_X86_64 from consts.rs"; exit 1; }

        # Download static type2-runtime
        # NOTE: 'continuous' is a floating tag — the binary changes on each upstream rebuild.
        # If CI fails here with a checksum mismatch, update the SHA256 in consts.rs.
        # See ADR-023 for context.
        curl -fsSL "https://github.com/AppImage/type2-runtime/releases/download/continuous/runtime-x86_64" \
          -o /tmp/runtime-x86_64
        echo "${RUNTIME_SHA256}  /tmp/runtime-x86_64" | sha256sum -c -

        # Download appimagetool
        curl -fsSL "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage" \
          -o /tmp/appimagetool
        chmod +x /tmp/appimagetool
        echo "${TOOL_SHA256}  /tmp/appimagetool" | sha256sum -c -

        # Find the built AppImage
        BUNDLE_DIR="desktop/src-tauri/target/release/bundle/appimage"
        APPIMAGE=$(find "$BUNDLE_DIR" -maxdepth 1 -name '*.AppImage' ! -name '*.AppImage.tar.gz' | head -1)
        [ -n "$APPIMAGE" ] || { echo "::error::No .AppImage found in $BUNDLE_DIR"; exit 1; }
        echo "Found AppImage: $APPIMAGE"

        # Extract the AppImage
        chmod +x "$APPIMAGE"
        cd "$(dirname "$APPIMAGE")"
        APPIMAGE_BASENAME="$(basename "$APPIMAGE")"
        "./$APPIMAGE_BASENAME" --appimage-extract

        # Repack with static runtime (APPIMAGE_EXTRACT_AND_RUN lets appimagetool run without FUSE on CI)
        APPIMAGE_EXTRACT_AND_RUN=1 /tmp/appimagetool \
          --runtime-file /tmp/runtime-x86_64 \
          squashfs-root/ \
          "$APPIMAGE_BASENAME"

        # Recreate updater tarball
        gzip -c "$APPIMAGE_BASENAME" > "${APPIMAGE_BASENAME}.tar.gz"

        # Cleanup
        rm -rf squashfs-root/

        echo "::notice::AppImage repacked with static type2-runtime: $APPIMAGE_BASENAME"
